[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "crow-plattform"
version = "0.7.0a1"
description = "Crow Decision Intelligence Platform with Document Intake"
requires-python = ">=3.11"
dependencies = ["pypdf>=5.0", "fastapi>=0.115", "uvicorn>=0.30", "python-multipart>=0.0.9", "httpx>=0.27"]

[project.scripts]
crow = "crow_module_conformance.cli:main"
crow-workbench = "crow_workbench.__main__:main"

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
  "ruff>=0.5",
  "mypy>=1.10",
  "build>=1.2"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
crow_module_sdk = ["py.typed"]
crow_module_conformance = ["py.typed"]
crow_document_intelligence = ["py.typed"]
crow_geometry_framework = ["py.typed"]
crow_reasoning = ["py.typed", "default_rules.json"]
crow_observation_engine = ["py.typed"]
crow_claim_extraction = ["py.typed"]
crow_knowledge_fusion = ["py.typed"]
crow_authority = ["py.typed"]
crow_authority_discovery = ["py.typed"]
crow_accepted_claims = ["py.typed"]
crow_decision_engine = ["py.typed"]
crow_technical_validation = ["py.typed"]
crow_technical_review = ["py.typed"]
crow_technical_delta = ["py.typed"]
crow_scope_impact = ["py.typed"]
crow_commercial_impact = ["py.typed"]
crow_commercial_adjustment = ["py.typed"]
crow_commercial_review = ["py.typed"]
crow_estimate_line = ["py.typed"]
crow_estimate_structure = ["py.typed"]
crow_estimate_revision = ["py.typed"]
crow_workbench = ["static/*"]
crow_import_framework = ["py.typed"]
crow_vent = ["py.typed", "vent_beteckningar_lexikon.json"]
crow_building_graph = ["py.typed"]
crow_knowledge_runtime = ["py.typed"]
crow_project_dataset = ["py.typed"]
crow_canonical = ["py.typed"]
crow_graph_rules = ["py.typed"]
crow_ifc_relations = ["py.typed"]
crow_cad_text = ["py.typed"]
crow_pdf_evidence = ["py.typed"]
crow_evidence_index = ["py.typed"]
crow_evidence_rules = ["py.typed"]
crow_assurance = ["py.typed"]
crow_project_manifest = ["py.typed"]
crow_evidence_explorer = ["py.typed"]
crow_audit_explorer = ["py.typed"]
crow_rule_explorer = ["py.typed"]
crow_rc1_workbench = ["py.typed"]
crow_graph_timeline = ["py.typed"]
crow_cross_source_linking = ["py.typed"]
crow_import_orchestrator = ["py.typed"]

[tool.pytest.ini_options]
testpaths = ["tests", "examples/crow_example_module/tests"]
pythonpath = ["src", "examples/crow_example_module/src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
strict = true
mypy_path = "src"
explicit_package_bases = true
packages = ["crow_module_sdk", "crow_module_conformance", "crow_document_intelligence", "crow_observation_engine", "crow_claim_extraction", "crow_knowledge_fusion", "crow_authority", "crow_authority_discovery", "crow_accepted_claims", "crow_decision_engine", "crow_technical_validation", "crow_technical_review", "crow_technical_delta", "crow_scope_impact", "crow_commercial_impact", "crow_commercial_adjustment", "crow_commercial_review", "crow_estimate_line", "crow_estimate_structure", "crow_estimate_revision", "crow_import_framework", "crow_geometry_framework", "crow_vent", "crow_building_graph", "crow_project_dataset", "crow_canonical", "crow_graph_rules", "crow_ifc_relations", "crow_cad_text", "crow_pdf_evidence", "crow_evidence_index", "crow_evidence_rules", "crow_assurance", "crow_project_manifest", "crow_graph_explorer", "crow_evidence_explorer", "crow_audit_explorer", "crow_rule_explorer", "crow_assurance_explorer", "crow_source_explorer", "crow_import_orchestrator", "crow_cross_source_linking", "crow_graph_timeline", "crow_rc1_workbench", "crow_takeoff_consolidation", "crow_dwg_conversion"]

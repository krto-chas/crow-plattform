name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip install -e modules/crow-vent-module
      - run: ruff check .
      - run: mypy
      - run: pytest -q
      - run: python -m crow_module_conformance.cli review --root .
      - run: python -m pip install build && python -m build

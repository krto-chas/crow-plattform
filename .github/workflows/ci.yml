name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Install first-party modules (if present)
        run: |
          if [ -d modules/crow-vent-module ]; then
            python -m pip install -e ./modules/crow-vent-module
          fi
      - run: ruff check .
      - run: mypy
      - run: pytest -q
      - name: Architecture review
        run: python -m crow_module_conformance.cli review --root .
      - name: Build distribution
        run: python -m pip install build && python -m build
